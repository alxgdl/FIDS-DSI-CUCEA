<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS CUCEA - Finalizado</title>
    <style>
        /* --- 1. CONFIGURACIÓN DEL FONDO --- */
        body {
            background-image: url('https://lh3.googleusercontent.com/d/15PfdBzPzKhcW8CUeBwGF7YVaJC8Knh6S');
            background-size: 1920px auto; 
            background-position: top left;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.6); 
            background-blend-mode: darken;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* --- 2. CONTENEDOR Y TABLA --- */
        #fids-container {
            margin-top: 190px; 
            padding: 0 225px;
            width: 100%;
        }

        table {
            border-collapse: collapse;
            table-layout: fixed; 
            width: 1750px; 
        }

        th { display: none; }

        /* --- 3. ESTILO BASE DE LAS CELDAS --- */
        td {
            padding: 8px 10px;
            font-size: 19px;
            font-weight: 500;
            color: #ffffff;
            border-bottom: 1px solid transparent;
            white-space: normal;
            vertical-align: middle; 
            height: 44px; 
            line-height: 1;
        }

        /* --- 4. TRUNCADO A 2 LÍNEAS --- */
        .recortar-texto {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- 5. CONFIGURACIÓN INDIVIDUAL DE COLUMNAS --- */
        td:nth-child(1) { width: 150px; color: #ffd700; font-weight: bold; font-size: 35px; }
        td:nth-child(2) { width: 140px; color: #ffffff; font-size: 30px; }
        td:nth-child(3) { width: 400px; color: #ffd700; font-size: 22px; }
        td:nth-child(4) { width: 400px; color: #ffffff; font-weight: bold; font-size: 22px; }
        td:nth-child(5) { width: 180px; text-align: center; } /* Columna Nivel Académico */
        td:nth-child(6) { width: 50px; }
        td:nth-child(7) { width: 300px; text-align: left; }

        /* --- Estilo para las imágenes de ESTADO (Columna 7) --- */
        .img-estado {
            height: 44px; 
            width: auto;
            display: inline-block;
            vertical-align: middle; /* Alineación vertical correcta */
        }
        
        /* --- Estilo para las imágenes de NIVEL (Columna 5) --- */
        .img-nivel {
            height: 30px; 
            width: auto;
            display: inline-block;
            vertical-align: middle;
        }

        .reloj {
            position: absolute;
            top: 35px;
            right: 60px;
            font-size: 34px;
            font-weight: bold;
            color: #ffd700;
        }
    </style>
</head>
<body>

    <div id="reloj" class="reloj">00:00:00</div>

    <div id="fids-container">
        <div id="tabla-datos">Cargando programación...</div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE IMÁGENES POR ESTADO ---
        const diccionarioEstados = {
            "EN CURSO": "BotonEncurso.png",
            "INICIANDO": "BotonIniciando.png",
            "FINALIZANDO": "BotonFinalizando.png",
            "PROGRAMADA": "BotonProgramada.png"
        };

        // --- CONFIGURACIÓN DE IMÁGENES POR NIVEL ACADÉMICO ---
        const diccionarioNiveles = {
            "T.S.U.": "BotonTSU.png",
            "LICENCIATURA": "BotonLicenciatura.png",
            "MAESTRIA": "BotonMaestria.png",
            "DOCTORADO": "BotonDoctorado.png"
        };

        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtJ6ZlMM6skUMzxHY2LYmtU3WBojxBxxP1k7_exlFwS4THkhsC9OAt6Iq4NjxoXDvnugZwRzTjA9ZI/pub?gid=1178925333&single=true&output=csv';
        const maxFilas = 16; 

        async function cargarDatos() {
            try {
                const respuesta = await fetch(csvUrl + '&t=' + Date.now());
                const texto = await respuesta.text();
                const filas = texto.split('\n');
                
                let tablaHTML = '<table><tbody>';

                for (let i = 1; i <= maxFilas; i++) {
                    if (filas[i]) {
                        const columnas = filas[i].split(',');
                        tablaHTML += '<tr>';
                        
                        for(let j=0; j<7; j++) {
                            let dato = columnas[j] ? columnas[j].trim() : '';
                            
                            // Col 2 y 3: Recorte de texto
                            if (j === 1 || j === 2) {
                                tablaHTML += `<td><div class="recortar-texto">${dato}</div></td>`;
                            } 
                            // NUEVA LÓGICA: Columna 5 (Nivel Académico)
                            else if (j === 4) {
                                let nivelUpper = dato.toUpperCase();
                                if (diccionarioNiveles[nivelUpper]) {
                                    tablaHTML += `<td><img src="${diccionarioNiveles[nivelUpper]}" class="img-nivel"></td>`;
                                } else {
                                    tablaHTML += `<td>${dato}</td>`;
                                }
                            }
                            // Columna 7: Estados
                            else if (j === 6) {
                                let estadoUpper = dato.toUpperCase();
                                if (diccionarioEstados[estadoUpper]) {
                                    tablaHTML += `<td><img src="${diccionarioEstados[estadoUpper]}" class="img-estado"></td>`;
                                } else {
                                    tablaHTML += `<td>${dato}</td>`;
                                }
                            }
                            // Resto de columnas
                            else {
                                tablaHTML += `<td>${dato}</td>`;
                            }
                        }
                        tablaHTML += '</tr>';
                    } else {
                        tablaHTML += '<tr style="height:60px"><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>';
                    }
                }

                tablaHTML += '</tbody></table>';
                document.getElementById('tabla-datos').innerHTML = tablaHTML;

            } catch (error) {
                console.error("Error al obtener datos:", error);
            }
        }

        function actualizarReloj() {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
        }

        actualizarReloj();
        setInterval(actualizarReloj, 1000);
        cargarDatos();
        setInterval(cargarDatos, 30000); 
    </script>
</body>
</html>
