<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS CUCEA</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; font-weight: bold; font-size: 1.2em; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #aaa; text-transform: uppercase; font-size: 0.8em; padding: 10px; }
        td { padding: 15px 10px; border-bottom: 1px solid #222; font-size: 1.1em; }
        .status-img { height: 30px; } /* Ajusta segun tus imagenes */
        #contenedor-tabla { transition: opacity 0.5s; }
    </style>
</head>
<body>

    <div class="header">
        <div id="totalmaterias">Cargando materias...</div>
        <div id="actualizacion">Sincronizando...</div>
    </div>

    <div id="contenedor-tabla">
        <table>
            <thead>
                <tr>
                    <th>Hora</th>
                    <th>Materia / Profesor</th>
                    <th>Aula</th>
                    <th>Edificio</th>
                    <th>Estatus</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
                </tbody>
        </table>
    </div>

    <script>
        // URL de exportación directa (Tiempo real)
        const csvUrl = 'https://docs.google.com/spreadsheets/d/1TtJ6ZlMM6skUMzxHY2LYmtU3WBojxBxxP1k7_exlFwS4THkhsC9OAt6Iq4NjxoXDvnugZwRzTjA9ZI/export?format=csv&gid=52319349';
        
        const filasPorPagina = 15;
        let todasLasFilas = [];
        let indicePagina = 0;

        // Diccionarios (Asegúrate de que los archivos .png estén en la misma carpeta que este HTML)
        const dicEstados = { "EN CURSO": "BotonEncurso.png", "INICIANDO": "BotonIniciando.png", "FINALIZANDO": "BotonFinalizando.png", "PROGRAMADA": "BotonProgramada.png" };
        const dicEdificios = { "I": "EdificioI.png", "N": "EdificioN.png", "K": "EdificioK.png", "L": "EdificioL.png", "P": "EdificioP.png", "Q": "EdificioQ.png" };

        async function cargarDatos() {
            try {
                // El timestamp '&t=' es vital para saltar el caché de 1 hora
                const r = await fetch(csvUrl + '&t=' + Date.now());
                if (!r.ok) throw new Error("Error de red");
                
                const texto = await r.text();
                const filas = texto.split('\n').map(f => f.split(',')).filter(f => f.length > 1);

                // --- PROCESAR ENCABEZADOS (H2 y H3 están en la columna 8 de las primeras filas) ---
                if (filas.length > 2) {
                    document.getElementById('totalmaterias').innerText = "MATERIAS ACTIVAS: " + (filas[1][7] || "0").replace(/"/g, "");
                    document.getElementById('actualizacion').innerText = "ACTUALIZADO: " + (filas[2][7] || "--:--").replace(/"/g, "");
                }

                // --- FILTRAR MATERIAS (Saltamos las filas de encabezado de tu Sheet) ---
                // Ajusta el '3' si tus datos reales empiezan en otra fila
                todasLasFilas = filas.slice(1); 
                
                renderizar();
            } catch (e) {
                console.error("Falla al cargar:", e);
                document.getElementById('totalmaterias').innerText = "Error de conexión con Google Sheets";
            }
        }

        function renderizar() {
            const cuerpo = document.getElementById('cuerpo-tabla');
            const inicio = indicePagina * filasPorPagina;
            const fin = inicio + filasPorPagina;
            const bloque = todasLasFilas.slice(inicio, fin);

            let html = "";
            bloque.forEach(col => {
                // Limpiamos comillas que pone Google
                const hora = col[0]?.replace(/"/g, "") || "";
                const materiaProfesor = col[1]?.replace(/"/g, "") || ""; // Asumiendo que combinaste materia/prof en Sheets
                const aula = col[2]?.replace(/"/g, "") || "";
                const edificioCod = col[3]?.replace(/"/g, "").trim() || "";
                const estadoCod = col[4]?.replace(/"/g, "").trim() || "";

                // Buscamos imágenes en diccionarios
                const imgEdificio = dicEdificios[edificioCod] ? `<img src="${dicEdificios[edificioCod]}" height="30">` : edificioCod;
                const imgEstado = dicEstados[estadoCod] ? `<img src="${dicEstados[estadoCod]}" height="30">` : estadoCod;

                html += `<tr>
                    <td style="color: #00ff00; font-weight: bold;">${hora}</td>
                    <td>${materiaProfesor}</td>
                    <td style="text-align: center;">${aula}</td>
                    <td style="text-align: center;">${imgEdificio}</td>
                    <td>${imgEstado}</td>
                </tr>`;
            });

            cuerpo.innerHTML = html;
        }

        // Rotación de páginas cada 15 segundos
        setInterval(() => {
            if (todasLasFilas.length > filasPorPagina) {
                indicePagina = (indicePagina + 1) % Math.ceil(todasLasFilas.length / filasPorPagina);
                renderizar();
            }
        }, 15000);

        // Recarga de datos de Google cada 60 segundos
        setInterval(cargarDatos, 60000);

        // Carga inicial
        cargarDatos();
    </script>
</body>
</html>
