<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS CUCEA - Diseño Personalizado</title>
    <style>
        /* --- 1. CONFIGURACIÓN DEL FONDO --- */
        body {
            background-image: url('https://lh3.googleusercontent.com/d/15PfdBzPzKhcW8CUeBwGF7YVaJC8Knh6S');
            background-size: 1920px auto; 
            background-position: top left;
            background-repeat: no-repeat;
            background-color: #030a1a; 
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* --- 2. CONTENEDOR Y TABLA --- */
        #fids-container {
            margin-top: 190px; 
            padding: 0 125px;
            width: 100%;
        }

        table {
            border-collapse: collapse;
            table-layout: fixed; 
            /* La suma de tus columnas es 1550px */
            width: 1550px; 
        }

        th { display: none; }

        /* --- 3. ESTILO BASE DE LAS CELDAS --- */
        td {
            padding: 8px 10px;
            font-size: 19px; /* Tamaño base para el resto de columnas */
            font-weight: 500;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            
            white-space: normal;
            word-wrap: break-word;
            vertical-align: center;
            height: 44px; /* Un poco más alto por si usas letras grandes */
            line-height: 1;
        }

        /* --- 4. CONFIGURACIÓN INDIVIDUAL DE COLUMNAS --- */

        /* Columna 1: Hora/NRC - Amarilla, Bold, Tamaño 25 */
        td:nth-child(1) { 
            width: 150px; 
            color: #ffd700; 
            font-weight: bold; 
            font-size: 35px; 
        }

        /* Columna 2: Materia - Blanca, Normal, Tamaño 25 */
        td:nth-child(2) { 
            width: 140px; 
            color: #ffffff; 
            font-weight: normal; 
            font-size: 30px; 
        }

        /* Columna 3: Configúrame aquí */
        td:nth-child(3) { 
            width: 400px; 
            color: #ffd700; 
            font-weight: normal; 
            font-size: 22px; 
        }

        /* Columna 4: Profesor */
        td:nth-child(4) { 
            width: 400px; 
            color: #ffffff; 
            font-weight: bold; 
            font-size: 22px; 
        }

        /* Columna 5: Edificio/Aula */
        td:nth-child(5) { 
            width: 150px; 
            color: #ffffff;
        }

        /* Columna 6: Nueva 6 */
        td:nth-child(6) { 
            width: 100px; 
            color: #ffffff;
        }

        /* Columna 7: Nueva 7 */
        td:nth-child(7) { 
            width: 300px; 
            color: #ffffff;
        }

        /* Reloj */
        .reloj {
            position: absolute;
            top: 35px;
            right: 60px;
            font-size: 34px;
            font-weight: bold;
            color: #ffd700;
        }
    </style>
</head>
<body>

    <div id="reloj" class="reloj">00:00:00</div>

    <div id="fids-container">
        <div id="tabla-datos">Cargando programación...</div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtJ6ZlMM6skUMzxHY2LYmtU3WBojxBxxP1k7_exlFwS4THkhsC9OAt6Iq4NjxoXDvnugZwRzTjA9ZI/pub?gid=1178925333&single=true&output=csv';
        const maxFilas = 16; 

        async function cargarDatos() {
            try {
                const respuesta = await fetch(csvUrl + '&t=' + Date.now());
                const texto = await respuesta.text();
                const filas = texto.split('\n');
                
                let tablaHTML = '<table><tbody>';

                for (let i = 1; i <= maxFilas; i++) {
                    if (filas[i]) {
                        const columnas = filas[i].split(',');
                        tablaHTML += '<tr>';
                        
                        // Recorremos las 7 columnas del CSV
                        for(let j=0; j<7; j++) {
                            let dato = columnas[j] ? columnas[j].trim() : '';
                            tablaHTML += `<td>${dato}</td>`;
                        }
                        
                        tablaHTML += '</tr>';
                    } else {
                        // Mantiene la altura visual aunque no haya datos
                        tablaHTML += '<tr style="height:60px"><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>';
                    }
                }

                tablaHTML += '</tbody></table>';
                document.getElementById('tabla-datos').innerHTML = tablaHTML;

            } catch (error) {
                console.error("Error al obtener datos:", error);
            }
        }

        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString();
        }

        actualizarReloj();
        setInterval(actualizarReloj, 1000);
        cargarDatos();
        setInterval(cargarDatos, 30000); 

    </script>
</body>
</html>
