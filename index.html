<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS CUCEA - Paginado con Fade RealTime</title>
    <style>
        /* --- 1. CONFIGURACIÓN DEL FONDO --- */
        body {
            background-image: url('FIDSFondo4.png');
            background-size: 1920px auto; 
            background-position: top left;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000; 
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* --- 2. CONTENEDORES --- */
        #fids-header-container {
            padding: 0 120px; 
            margin-top: 78px;
        }

        #fids-container {
            margin-top: 45px; 
            padding: 0 120px;
            width: 100%;
        }

        /* EFECTO DESVANECEDOR (FADE) */
        #tabla-datos {
            transition: opacity 0.5s ease-in-out;
            opacity: 1;
        }

        .fade-out {
            opacity: 0 !important;
        }

        /* --- 3. ESTRUCTURA BASE DE TABLAS --- */
        table {
            border-collapse: collapse;
            table-layout: fixed; 
            width: 1300px;
        }

        td, th {
            padding: 8px 10px;
            vertical-align: middle; 
            height: 45px; 
            line-height: 1;
        }

        .tabla-encabezado {
            background-color: transparent;
        }
        
        .tabla-encabezado th {
            color: #ffd700; /* Dorado */
            font-size: 30px; 
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 3px solid #ffd700;
            text-align: left;
        }

        .tabla-encabezado th:nth-child(1),
        .tabla-encabezado th:nth-child(2),
        .tabla-encabezado th:nth-child(3),
        .tabla-encabezado th:nth-child(6), 
        .tabla-encabezado th:nth-child(7) {
            text-align: center;
        }

        /* --- 5. ESTILOS DE DATOS --- */
        #tabla-datos td {
            font-size: 19px;
            font-weight: 500;
            color: #ffffff;
        }

        #tabla-datos td:nth-child(1) { text-align: center; font-size: 33px; font-weight: bold; } 
        #tabla-datos td:nth-child(2) { text-align: center; color: #B3E5FC; font-size: 28px; }   
        #tabla-datos td:nth-child(3) { text-align: center; }                                   
        #tabla-datos td:nth-child(4) { text-align: left; color: #B3E5FC; font-weight: bold; font-size: 22px; } 
        #tabla-datos td:nth-child(5) { text-align: left; font-size: 22px; }                    
        #tabla-datos td:nth-child(6) { text-align: center; font-size: 28px; font-weight: bold; } 
        #tabla-datos td:nth-child(7) { text-align: center; }                                     

        .col-1 { width: 150px; }
        .col-2 { width: 120px; }
        .col-3 { width: 220px; }
        .col-4 { width: 380px; }
        .col-5 { width: 330px; }
        .col-6 { width: 150px; }
        .col-7 { width: 180px; }

        .img-estado { height: 44px; width: auto; vertical-align: middle; }
        .img-nivel { height: 30px; width: auto; vertical-align: middle; }
        .img-edificio { height: 44px; width: auto; vertical-align: middle; margin-right: 8px; }

        @keyframes parpadeo {
          0% { opacity: 1; }
          50% { opacity: 0.3; }
          100% { opacity: 1; }
        }
        .efecto-parpadeo { animation: parpadeo 2.5s infinite ease-in-out; }

        .recortar-texto {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- 8. FOOTER FIJO --- */
        .reloj-fijo { position: fixed; top: 1152px; left: 1265px; text-align: center; z-index: 100; }
        #reloj { font-size: 35px; font-weight: bold; color: #ffffff; line-height: 1; }
        
        .paginador-fijo { position: fixed; top: 1150px; left: 1565px; text-align: center; z-index: 100; }                
        #paginador { font-size: 33px; color: #ffffff; font-weight: bold; } 

        .totalmaterias-fijo { position: fixed; top: 1150px; left: 145px; z-index: 100; }                
        #totalmaterias { font-size: 33px; color: #ffffff; font-weight: bold; } 

        .actualizacion-fijo { position: fixed; top: 1150px; left: 680px; z-index: 100; }                
        #actualizacion { font-size: 33px; color: #ffffff; font-weight: bold; }
        
    </style>
</head>
<body>

    <div id="fids-header-container">
        <table class="tabla-encabezado">
            <thead>
                <tr>
                    <th class="col-1">HORA</th>
                    <th class="col-2">FIN</th>
                    <th class="col-3">NIVEL</th>
                    <th class="col-4">ASIGNATURA</th>
                    <th class="col-5">DOCENTE</th>
                    <th class="col-6">LUGAR</th>
                    <th class="col-7">ESTADO</th>
                </tr>
            </thead>
        </table>
    </div>

    <div id="fids-container">
        <div id="tabla-datos">Iniciando sistema FIDS...</div>
    </div>

    <div class="footer-info">
        <div class="totalmaterias-fijo"><div id="totalmaterias">MATERIAS: --</div></div>
        <div class="actualizacion-fijo"><div id="actualizacion">SINCRONIZANDO...</div></div>
        <div class="reloj-fijo"><div id="reloj">00:00:00</div></div>
        <div class="paginador-fijo"><div id="paginador">PÁGINA --</div></div>
    </div>

    <script>
        // Esta es la liga de exportación real basada en tu enlace de compartir
        const csvUrl = 'https://docs.google.com/spreadsheets/d/1_gTIomo9spX-k5ZjPOC44JcMgErMCvPNUj2B1v4zHXU/export?format=csv&gid=52319349';
        
        const filasPorPagina = 15;
        let todasLasFilas = [];
        let indicePagina = 0;
        let ultimoContenidoCSV = ""; 

        const diccionarioEstados = { "EN CURSO": "BotonEncurso.png", "INICIANDO": "BotonIniciando.png", "FINALIZANDO": "BotonFinalizando.png", "PROGRAMADA": "BotonProgramada.png" };
        const diccionarioNiveles = { "T.S.U.": "botonTSU.png", "LICENCIATURA": "botonLicenciatura.png", "MAESTRIA": "botonMaestria.png", "DOCTORADO": "botonDoctorado.png" };
        const diccionarioEdificios = { "I": "EdificioI.png", "N": "EdificioN.png", "K": "EdificioK.png", "L": "EdificioL.png", "P": "EdificioP.png", "Q": "EdificioQ.png" };

        async function cargarDatos() {
            try {
                // Fetch con Cache-Buster dinámico para datos frescos cada 60s
                const respuesta = await fetch(`${csvUrl}&t=${Date.now()}`, {
                    cache: "no-store",
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
                });
                
                const texto = await respuesta.text();
                const textoLimpio = texto.replace(/^\uFEFF/, "").trim();

                // Evitar procesar si los datos no han cambiado en el Sheets
                if (textoLimpio === ultimoContenidoCSV) return;
                ultimoContenidoCSV = textoLimpio;

                const filasBrutas = textoLimpio.split('\n').filter(f => f.trim() !== '');

                // Datos Globales (Encabezados H2 y H3)
                if (filasBrutas.length >= 3) {
                    const colH2 = filasBrutas[1].split(',');
                    const colH3 = filasBrutas[2].split(',');
                    document.getElementById('totalmaterias').innerText = `MATERIAS ACTIVAS DSI: ${(colH2[7] || "").replace(/"/g, "").trim()}`;
                    document.getElementById('actualizacion').innerText = `ÚLTIMA ACTUALIZACIÓN: ${(colH3[7] || "").replace(/"/g, "").trim()}`;
                }

                // Guardar datos (Saltamos la primera fila de nombres de columna)
                todasLasFilas = filasBrutas.slice(1); 
                
                // Si es la primera carga, mostramos de inmediato
                if (document.getElementById('tabla-datos').innerText.includes("Iniciando")) {
                    mostrarPagina();
                }

            } catch (error) {
                console.error("Error al sincronizar:", error);
            }
        }

        function mostrarPagina() {
            if (todasLasFilas.length === 0) return;

            const contenedor = document.getElementById('tabla-datos');
            contenedor.classList.add('fade-out');

            setTimeout(() => {
                const totalPaginas = Math.ceil(todasLasFilas.length / filasPorPagina);
                const inicio = indicePagina * filasPorPagina;
                const fin = inicio + filasPorPagina;
                const filasActuales = todasLasFilas.slice(inicio, fin);

                document.getElementById('paginador').innerText = `PÁGINA ${indicePagina + 1} de ${totalPaginas}`;

                let tablaHTML = '<table><tbody>';

                for (let i = 0; i < filasPorPagina; i++) {
                    if (filasActuales[i]) {
                        const columnas = filasActuales[i].split(',');
                        // Tu orden específico: Hora, Fin, Nivel, Asignatura, Docente, Lugar, Estado
                        const ordenColumnas = [0, 1, 4, 2, 3, 5, 6];
                        
                        tablaHTML += '<tr>';
                        ordenColumnas.forEach((indiceOriginal, posicionVisual) => {
                            let dato = (columnas[indiceOriginal] || '').replace(/"/g, "").trim();
                            let claseAncho = `col-${posicionVisual + 1}`;

                            if (posicionVisual === 3 || posicionVisual === 4) { 
                                tablaHTML += `<td class="${claseAncho}"><div class="recortar-texto">${dato}</div></td>`;
                            } 
                            else if (posicionVisual === 5) { 
                                let letra = dato.charAt(0).toUpperCase();
                                tablaHTML += `<td class="${claseAncho}">${diccionarioEdificios[letra] ? `<img src="${diccionarioEdificios[letra]}" class="img-edificio">${dato.slice(1)}` : dato}</td>`;
                            }
                            else if (posicionVisual === 2) { 
                                let nivelUpper = dato.toUpperCase();
                                tablaHTML += `<td class="${claseAncho}">${diccionarioNiveles[nivelUpper] ? `<img src="${diccionarioNiveles[nivelUpper]}" class="img-nivel">` : dato}</td>`;
                            }
                            else if (posicionVisual === 6) { 
                                let estUpper = dato.toUpperCase();
                                let parpadea = (estUpper === "FINALIZANDO" || estUpper === "INICIANDO") ? "efecto-parpadeo" : "";
                                tablaHTML += `<td class="${claseAncho}">${diccionarioEstados[estUpper] ? `<img src="${diccionarioEstados[estUpper]}" class="img-estado ${parpadea}">` : dato}</td>`;
                            }
                            else {
                                tablaHTML += `<td class="${claseAncho}">${dato}</td>`;
                            }
                        });
                        tablaHTML += '</tr>';
                    } else {
                        // Fila vacía para mantener la estructura visual si hay menos de 15 filas
                        tablaHTML += '<tr style="height:60px"><td colspan="7"></td></tr>';
                    }
                }

                tablaHTML += '</tbody></table>';
                contenedor.innerHTML = tablaHTML;
                contenedor.classList.remove('fade-out');

                indicePagina = (indicePagina + 1) % totalPaginas;
            }, 500);
        }

        function actualizarReloj() {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString('es-MX', { hour12: false });
        }

        // Inicialización
        actualizarReloj();
        setInterval(actualizarReloj, 1000);
        
        cargarDatos(); // Carga inicial
        setInterval(cargarDatos, 60000); // Sincroniza con Sheets cada 1 minuto (RealTime)
        setInterval(mostrarPagina, 10000); // Cambia página cada 10 segundos
        
    </script>
</body>
</html>
