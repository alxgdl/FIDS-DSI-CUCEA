<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS CUCEA - Paginado con Fade</title>
    <style>
        /* --- 1. CONFIGURACIÓN DEL FONDO --- */
        body {
            background-image: url('FIDSFondo4.png');
            background-size: 1920px auto; 
            background-position: top left;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.3); 
            background-blend-mode: darken;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* --- 2. CONTENEDORES --- */
        #fids-header-container {
            padding: 0 120px; 
            margin-top: 82px;
        }

        #fids-container {
            margin-top: 50px; 
            padding: 0 120px;
            width: 100%;
        }

        /* EFECTO DESVANECEDOR (FADE) */
        #tabla-datos {
            transition: opacity 0.5s ease-in-out;
            opacity: 1;
        }

        .fade-out {
            opacity: 0 !important;
        }

        /* --- 3. ESTRUCTURA BASE DE TABLAS --- */
        table {
            border-collapse: collapse;
            table-layout: fixed; 
            width: 1550px;
        }

        td, th {
            padding: 8px 10px;
            vertical-align: middle; 
            height: 44px; 
            line-height: 1;
        }

        /* --- 4. ESTILOS EXCLUSIVOS DEL ENCABEZADO (Diferente a los datos) --- */
        .tabla-encabezado {
            background-color: transparent;
        }
        
        .tabla-encabezado th {
            color: #ffd700; /* Dorado */
            font-size: 30px; /* Tamaño específico para títulos */
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 3px solid #ffd700;
            text-align: left;
        }

        /* Alineaciones específicas para los títulos */
        .tabla-encabezado th:nth-child(1),
        .tabla-encabezado th:nth-child(2),
        .tabla-encabezado th:nth-child(3),
        .tabla-encabezado th:nth-child(6) {
            text-align: center;
        }

        /* --- 5. ESTILOS EXCLUSIVOS DE LOS DATOS --- */
        #tabla-datos td {
            font-size: 19px;
            font-weight: 500;
            color: #ffffff;
            border-bottom: 0px solid rgba(255, 255, 255, 0.1);
        }

        /* Personalización de columnas de DATOS (sin afectar th) */
        #tabla-datos td:nth-child(1) { text-align: center; font-size: 33px; font-weight: bold; } /* Hora */
        #tabla-datos td:nth-child(2) { text-align: center; color: #B3E5FC; font-size: 30px; }   /* Fin */
        #tabla-datos td:nth-child(3) { text-align: center; }                                   /* Nivel */
        #tabla-datos td:nth-child(4) { text-align: left; color: #B3E5FC; font-weight: bold; font-size: 22px; } /* Asignatura */
        #tabla-datos td:nth-child(5) { text-align: left; font-size: 22px; }                    /* Docente */
        #tabla-datos td:nth-child(6) { text-align: left; font-size: 28px; font-weight: bold; } /* Lugar */
        #tabla-datos td:nth-child(7) { text-align: center; }                                     /* Estado */

        /* --- 6. CONFIGURACIÓN DE ANCHOS (Consistente para ambas tablas) --- */
        .col-1 { width: 150px; }
        .col-2 { width: 120px; }
        .col-3 { width: 220px; }
        .col-4 { width: 380px; }
        .col-5 { width: 340px; }
        .col-6 { width: 100px; }
        .col-7 { width: 320px; }

        /* --- 7. COMPONENTES VISUALES --- */
        .img-estado { height: 44px; width: auto; vertical-align: middle; }
        .img-nivel { height: 30px; width: auto; vertical-align: middle; }
        .img-edificio { height: 44px; width: auto; vertical-align: middle; margin-right: 8px; }

        @keyframes parpadeo {
          0% { opacity: 1; }
          50% { opacity: 0.3; }
          100% { opacity: 1; }
        }

        .efecto-parpadeo { animation: parpadeo 2.5s infinite ease-in-out; }

        .recortar-texto {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            #overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- 8. RELOJ Y PAGINADOR --- */
        .reloj-fijo {
            position: fixed;
            top: 1080px;
            left: 1150px;
            text-align: left;
            z-index: 100;
        }

        #reloj {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            line-height: 1;
        }

        .paginador-fijo {
            position: fixed;
            top: 1080px;
            left: 1350px;
            text-align: left;
            z-index: 100;
        }
        
        .paginador {
            font-size: 20px;
            color: #ffffff;
            font-weight: normal;
            margin-top: 5px;
        } 
    </style>
</head>
<body>

    <div id="fids-header-container">
        <table class="tabla-encabezado">
            <thead>
                <tr>
                    <th class="col-1">HORA</th>
                    <th class="col-2">FIN</th>
                    <th class="col-3">NIVEL</th>
                    <th class="col-4">ASIGNATURA</th>
                    <th class="col-5">DOCENTE</th>
                    <th class="col-6">LUGAR</th>
                    <th class="col-7">ESTADO</th>
                </tr>
            </thead>
        </table>
    </div>

    <div id="fids-container">
        <div id="tabla-datos">Cargando programación...</div>
    </div>

    <div class="reloj-fijo">
        <div id="reloj">00:00:00</div>
        <div id="paginador" class="paginador">PÁGINA 1 de 1</div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtJ6ZlMM6skUMzxHY2LYmtU3WBojxBxxP1k7_exlFwS4THkhsC9OAt6Iq4NjxoXDvnugZwRzTjA9ZI/pub?gid=52319349&single=true&output=csv';
        
        const filasPorPagina = 15;
        let todasLasFilas = [];
        let indicePagina = 0;

        const diccionarioEstados = { "EN CURSO": "BotonEncurso.png", "INICIANDO": "BotonIniciando.png", "FINALIZANDO": "BotonFinalizando.png", "PROGRAMADA": "BotonProgramada.png" };
        const diccionarioNiveles = { "T.S.U.": "botonTSU.png", "LICENCIATURA": "botonLicenciatura.png", "MAESTRIA": "botonMaestria.png", "DOCTORADO": "botonDoctorado.png" };
        const diccionarioEdificios = { "I": "EdificioI.png", "N": "EdificioN.png", "K": "EdificioK.png", "L": "EdificioL.png", "P": "EdificioP.png", "Q": "EdificioQ.png" };

        async function cargarDatos() {
            try {
                const respuesta = await fetch(csvUrl + '&t=' + Date.now());
                const texto = await respuesta.text();
                const filasBrutas = texto.split('\n').filter(f => f.trim() !== '');
                todasLasFilas = filasBrutas.slice(1); 
                if(indicePagina === 0) mostrarPagina();
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function mostrarPagina() {
            if (todasLasFilas.length === 0) return;

            const contenedor = document.getElementById('tabla-datos');
            contenedor.classList.add('fade-out');

            setTimeout(() => {
                const totalPaginas = Math.ceil(todasLasFilas.length / filasPorPagina);
                const inicio = indicePagina * filasPorPagina;
                const fin = inicio + filasPorPagina;
                const filasActuales = todasLasFilas.slice(inicio, fin);

                document.getElementById('paginador').innerText = `PÁGINA ${indicePagina + 1} de ${totalPaginas}`;

                let tablaHTML = '<table><tbody>';

                for (let i = 0; i < filasPorPagina; i++) {
                    if (filasActuales[i]) {
                        const columnas = filasActuales[i].split(',');
                        const ordenColumnas = [0, 1, 4, 2, 3, 5, 6];
                        
                        tablaHTML += '<tr>';
                        ordenColumnas.forEach((indiceOriginal, posicionVisual) => {
                            let dato = columnas[indiceOriginal] ? columnas[indiceOriginal].trim() : '';
                            let claseAncho = `col-${posicionVisual + 1}`;

                            if (posicionVisual === 3 || posicionVisual === 4) { 
                                tablaHTML += `<td class="${claseAncho}"><div class="recortar-texto">${dato}</div></td>`;
                            } 
                            else if (posicionVisual === 5) { 
                                let letra = dato.charAt(0).toUpperCase();
                                tablaHTML += `<td class="${claseAncho}">${diccionarioEdificios[letra] ? `<img src="${diccionarioEdificios[letra]}" class="img-edificio">${dato.slice(1)}` : dato}</td>`;
                            }
                            else if (posicionVisual === 2) { 
                                let nivelUpper = dato.toUpperCase();
                                tablaHTML += `<td class="${claseAncho}">${diccionarioNiveles[nivelUpper] ? `<img src="${diccionarioNiveles[nivelUpper]}" class="img-nivel">` : dato}</td>`;
                            }
                            else if (posicionVisual === 6) { 
                                let estUpper = dato.toUpperCase();
                                let parpadea = (estUpper === "FINALIZANDO" || estUpper === "INICIANDO") ? "efecto-parpadeo" : "";
                                tablaHTML += `<td class="${claseAncho}">${diccionarioEstados[estUpper] ? `<img src="${diccionarioEstados[estUpper]}" class="img-estado ${parpadea}">` : dato}</td>`;
                            }
                            else {
                                tablaHTML += `<td class="${claseAncho}">${dato}</td>`;
                            }
                        });
                        tablaHTML += '</tr>';
                    } else {
                        tablaHTML += '<tr style="height:60px"><td colspan="7"></td></tr>';
                    }
                }

                tablaHTML += '</tbody></table>';
                contenedor.innerHTML = tablaHTML;
                contenedor.classList.remove('fade-out');

                indicePagina = (indicePagina + 1) % totalPaginas;
            }, 500);
        }

        function actualizarReloj() {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
        }

        actualizarReloj();
        setInterval(actualizarReloj, 1000);
        cargarDatos();
        setInterval(cargarDatos, 30000); 
        setInterval(mostrarPagina, 10000); 
    </script>
</body>
</html>
