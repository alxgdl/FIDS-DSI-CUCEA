<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS CUCEA - Programación en Vivo</title>
    <style>
        /* --- 1. CONFIGURACIÓN DEL FONDO --- */
        body {
            /* 1. Mantenemos tu imagen de Google Drive o el link directo */
            background-image: url('https://lh3.googleusercontent.com/d/15PfdBzPzKhcW8CUeBwGF7YVaJC8Knh6S');
            
            /* 2. FIJAR TAMAÑO EXACTO */
            /* Opción A (Píxeles): Control total. Si tu foto es para una tele 1080p, pon 1920px. 
               Ajusta este número si se ve muy grande. */
            background-size: 1920px auto; 
        
            /* Opción B (Porcentaje): Se adapta un poco más a la tele, pero mantiene proporción. */
            /* background-size: 100% auto; */ 
        
            /* 3. ALINEAR ARRIBA A LA IZQUIERDA */
            background-position: top left;
            
            /* 4. EVITAR QUE SE REPTITA */
            background-repeat: no-repeat;
            
            /* 5. FONDO DE RESPALDO (Si la imagen falla o es más chica que la tele) */
            background-color: #030a1a; 
            background-attachment: fixed; /* Mantiene el fondo quieto al hacer scroll (opcional) */
            
            /* ... resto de propiedades de body (color, font, margin, overflow) ... */
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        /* --- 2. CONTENEDOR DE LA TABLA (TRANSPARENTE) --- */
        #fids-container {
            margin-top: 160px; /* Ajusta este número para que los datos bajen a las líneas de tu imagen */
            padding: 0 40px;
            width: 100%;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Mantiene las columnas alineadas */
        }

        /* Ocultamos los encabezados de texto si tu imagen ya los tiene dibujados */
        th {
            display: none; 
        }

        /* --- 3. ESTILO DE LAS FILAS DE DATOS --- */
        td {
            padding: 10px 5px;
            font-size: 22px; /* Tamaño ideal para Fire TV */
            font-weight: 500;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); /* Línea divisoria casi invisible */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 35px; /* Altura fija para que coincida con tus 15 líneas */
        }

        /* Colores específicos por columna (opcional) */
        td:nth-child(1) { color: #ffd700; font-weight: bold; width: 80px; } /* Hora o NRC en Dorado */
        
        /* Reloj Flotante */
        .reloj {
            position: absolute;
            top: 35px;
            right: 50px;
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

    <div id="reloj" class="reloj">00:00:00</div>

    <div id="fids-container">
        <div id="tabla-datos">Cargando programación...</div>
    </div>

    <script>
        // 1. TU ENLACE CSV DE GOOGLE SHEETS
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtJ6ZlMM6skUMzxHY2LYmtU3WBojxBxxP1k7_exlFwS4THkhsC9OAt6Iq4NjxoXDvnugZwRzTjA9ZI/pub?gid=1178925333&single=true&output=csv';

        // 2. CONFIGURACIÓN DE VISUALIZACIÓN
        const maxFilas = 16; // Exactamente las 15 que pediste

        async function cargarDatos() {
            try {
                // El timestamp '&t=' evita que el Fire Stick guarde caché viejo
                const respuesta = await fetch(csvUrl + '&t=' + Date.now());
                const texto = await respuesta.text();
                const filas = texto.split('\n');
                
                let tablaHTML = '<table><tbody>';

                // Empezamos en i=1 para saltar el encabezado de Google Sheets
                for (let i = 1; i <= maxFilas; i++) {
                    if (filas[i]) {
                        const columnas = filas[i].split(',');
                        tablaHTML += '<tr>';
                        columnas.forEach(col => {
                            tablaHTML += `<td>${col.trim()}</td>`;
                        });
                        tablaHTML += '</tr>';
                    } else {
                        // Si hay menos de 15 filas, crea filas vacías para mantener el diseño
                        tablaHTML += '<tr style="height:35px"><td></td><td></td><td></td><td></td><td></td></tr>';
                    }
                }

                tablaHTML += '</tbody></table>';
                document.getElementById('tabla-datos').innerHTML = tablaHTML;

            } catch (error) {
                console.error("Error al obtener CSV:", error);
            }
        }

        // Reloj en tiempo real
        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString();
        }

        // Ejecución
        actualizarReloj();
        setInterval(actualizarReloj, 1000);
        
        cargarDatos();
        setInterval(cargarDatos, 10000); // Actualiza datos cada minuto

    </script>
</body>
</html>
