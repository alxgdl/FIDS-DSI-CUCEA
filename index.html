<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS CUCEA - 7 Columnas Fijas</title>
    <style>
        /* --- 1. CONFIGURACIÓN VISUAL DEL FONDO --- */
        body {
            background-image: url('https://lh3.googleusercontent.com/d/15PfdBzPzKhcW8CUeBwGF7YVaJC8Knh6S');
            background-size: 1920px auto; 
            background-position: top left;
            background-repeat: no-repeat;
            background-color: #030a1a; 
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* --- 2. CONTENEDOR Y TABLA --- */
        #fids-container {
            margin-top: 189px; 
            padding: 0 125px;
            width: 100%;
        }

        table {
            border-collapse: collapse;
            table-layout: fixed; /* Fuerza el respeto a los píxeles */
            width: 1850px; /* SUMA TOTAL DE LOS ANCHOS DE ABAJO */
        }

        th { display: none; }

        /* --- 3. ESTILO DE LAS CELDAS (MULTILÍNEA) --- */
        td {
            padding: 8px 10px;
            font-size: 19px; /* Un poco más pequeña para que quepan 7 columnas */
            font-weight: 500;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            
            white-space: normal;
            word-wrap: break-word;
            vertical-align: center;
            height: 44px;
            line-height: 1.1;
        }

        /* --- 4. ANCHOS DE LAS 7 COLUMNAS (Ajusta los PX aquí) --- */
        /* La suma de estos 7 valores debe ser cercana a 1850px */
        td:nth-child(1) { width: 100px; color: #ffd700; font-weight: bold; } /* Hora/NRC */
        td:nth-child(2) { width: 100px; } /* Materia */
        td:nth-child(3) { width: 400px; } /* Col 3 */
        td:nth-child(4) { width: 400px; } /* Profesor */
        td:nth-child(5) { width: 150px; } /* Edificio/Aula */
        td:nth-child(6) { width: 100px; } /* COLUMNA NUEVA 6 */
        td:nth-child(7) { width: 300px; } /* COLUMNA NUEVA 7 */

        /* Reloj */
        .reloj {
            position: absolute;
            top: 35px;
            right: 60px;
            font-size: 34px;
            font-weight: bold;
            color: #ffd700;
        }
    </style>
</head>
<body>

    <div id="reloj" class="reloj">00:00:00</div>

    <div id="fids-container">
        <div id="tabla-datos">Cargando 7 columnas...</div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtJ6ZlMM6skUMzxHY2LYmtU3WBojxBxxP1k7_exlFwS4THkhsC9OAt6Iq4NjxoXDvnugZwRzTjA9ZI/pub?gid=1178925333&single=true&output=csv';
        const maxFilas = 16; 

        async function cargarDatos() {
            try {
                const respuesta = await fetch(csvUrl + '&t=' + Date.now());
                const texto = await respuesta.text();
                const filas = texto.split('\n');
                
                let tablaHTML = '<table><tbody>';

                for (let i = 1; i <= maxFilas; i++) {
                    if (filas[i]) {
                        const columnas = filas[i].split(',');
                        tablaHTML += '<tr>';
                        
                        // CAMBIO AQUÍ: Ahora recorremos 7 columnas (0 al 6)
                        for(let j=0; j<7; j++) {
                            let dato = columnas[j] ? columnas[j].trim() : '';
                            tablaHTML += `<td>${dato}</td>`;
                        }
                        
                        tablaHTML += '</tr>';
                    } else {
                        // Relleno vacío para mantener el diseño
                        tablaHTML += '<tr style="height:55px"><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>';
                    }
                }

                tablaHTML += '</tbody></table>';
                document.getElementById('tabla-datos').innerHTML = tablaHTML;

            } catch (error) {
                console.error("Error al obtener las 7 columnas:", error);
            }
        }

        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString();
        }

        actualizarReloj();
        setInterval(actualizarReloj, 1000);
        cargarDatos();
        setInterval(cargarDatos, 30000); 

    </script>
</body>
</html>
