<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FIDS CUCEA - Monitor de Materias</title>
    <style>
        /* Estilos base para apariencia de aeropuerto (FIDS) */
        body {
            background-color: black;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        #contenedor-tabla {
            transition: opacity 0.3s ease-in-out;
        }
        .header-fids {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #444;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        /* Aquí puedes agregar tus estilos de tabla y botones */
    </style>
</head>
<body>

    <div class="header-fids">
        <div id="totalmaterias">MATERIAS ACTIVAS DSI: Cargando...</div>
        <div id="actualizacion">ÚLTIMA ACTUALIZACIÓN: --:--</div>
    </div>

    <div id="contenedor-tabla">
        <table id="tabla-datos">
            <tbody id="cuerpo-tabla"></tbody>
        </table>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        // Usamos /export para saltar el caché de 1 hora de Google
        const csvUrl = 'https://docs.google.com/spreadsheets/d/1TtJ6ZlMM6skUMzxHY2LYmtU3WBojxBxxP1k7_exlFwS4THkhsC9OAt6Iq4NjxoXDvnugZwRzTjA9ZI/export?format=csv&gid=52319349';
        
        const filasPorPagina = 15;
        let todasLasFilas = [];
        let indicePagina = 0;
        let ultimoTextoCSV = ""; // Para evitar refrescos visuales si el dato es igual

        // Tus diccionarios de imágenes
        const diccionarioEstados = { "EN CURSO": "BotonEncurso.png", "INICIANDO": "BotonIniciando.png", "FINALIZANDO": "BotonFinalizando.png", "PROGRAMADA": "BotonProgramada.png" };
        const diccionarioNiveles = { "T.S.U.": "botonTSU.png", "LICENCIATURA": "botonLicenciatura.png", "MAESTRIA": "botonMaestria.png", "DOCTORADO": "botonDoctorado.png" };
        const diccionarioEdificios = { "I": "EdificioI.png", "N": "EdificioN.png", "K": "EdificioK.png", "L": "EdificioL.png", "P": "EdificioP.png", "Q": "EdificioQ.png" };

        // --- FUNCIÓN PRINCIPAL: CARGA DE DATOS ---
        async function cargarDatos() {
            try {
                // Forzamos petición fresca con timestamp y headers de no-cache
                const respuesta = await fetch(`${csvUrl}&t=${Date.now()}`, {
                    method: 'GET',
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache'
                    }
                });

                if (!respuesta.ok) throw new Error("Error al conectar con Google");

                let texto = await respuesta.text();
                texto = texto.replace(/^\uFEFF/, "").trim(); // Limpiar caracteres basura de Excel/Google

                // Si los datos son idénticos a la carga anterior, no hacemos nada (evita parpadeo)
                if (texto === ultimoTextoCSV) {
                    console.log("Sin cambios detectados en la nube.");
                    return;
                }
                ultimoTextoCSV = texto;

                const filasBrutas = texto.split('\n').filter(f => f.trim() !== '');

                // --- EXTRACTOR DE ENCABEZADOS (H2 y H3 en columna 8) ---
                if (filasBrutas.length >= 3) {
                    const elTotal = document.getElementById('totalmaterias');
                    const elActualizacion = document.getElementById('actualizacion');

                    // Fila 2, Columna 8 (índice 7)
                    const datoH2 = (filasBrutas[1].split(',')[7] || "").replace(/"/g, "").trim();
                    // Fila 3, Columna 8 (índice 7)
                    const datoH3 = (filasBrutas[2].split(',')[7] || "").replace(/"/g, "").trim();

                    if (elTotal) elTotal.innerText = `MATERIAS ACTIVAS DSI: ${datoH2}`;
                    if (elActualizacion) elActualizacion.innerText = `ÚLTIMA ACTUALIZACIÓN: ${datoH3}`;
                }

                // Guardar datos (asumiendo que los datos reales empiezan después de encabezados o desde fila 1)
                todasLasFilas = filasBrutas.slice(1); 
                
                // Mostrar siempre la primera página tras una carga exitosa de nuevos datos
                mostrarPagina();

            } catch (error) {
                console.error("Fallo en la actualización:", error);
            }
        }

        // --- FUNCIÓN DE RENDERIZADO ---
        function mostrarPagina() {
            const contenedor = document.getElementById('contenedor-tabla');
            if (contenedor) contenedor.style.opacity = "0"; // Efecto fade out breve

            setTimeout(() => {
                const inicio = indicePagina * filasPorPagina;
                const fin = inicio + filasPorPagina;
                const filasVisibles = todasLasFilas.slice(inicio, fin);

                // Aquí construyes tu HTML de la tabla
                let html = "";
                filasVisibles.forEach(filaTexto => {
                    const columnas = filaTexto.split(',');
                    // Ejemplo de cómo usar tus diccionarios:
                    // const imgEstado = diccionarioEstados[columnas[X]] || "default.png";
                    
                    html += `<tr>`;
                    columnas.forEach(col => {
                        html += `<td>${col.replace(/"/g, "")}</td>`;
                    });
                    html += `</tr>`;
                });

                document.getElementById('cuerpo-tabla').innerHTML = html;
                if (contenedor) contenedor.style.opacity = "1"; // Efecto fade in
            }, 300);
        }

        // --- CICLO DE PAGINACIÓN AUTOMÁTICA ---
        setInterval(() => {
            if (todasLasFilas.length > filasPorPagina) {
                indicePagina = (indicePagina + 1) % Math.ceil(todasLasFilas.length / filasPorPagina);
                mostrarPagina();
            }
        }, 15000); // Cambia de página cada 15 segundos

        // --- CICLO DE RECARGA DE DATOS (Cada minuto) ---
        setInterval(cargarDatos, 60000);

        // Carga inicial al abrir
        cargarDatos();

    </script>
</body>
</html>
