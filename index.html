<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS CUCEA - Paginado con Fade</title>
    <style>
        /* --- 1. CONFIGURACIÓN DEL FONDO --- */
        body {
            background-image: url('https://lh3.googleusercontent.com/d/15PfdBzPzKhcW8CUeBwGF7YVaJC8Knh6S');
            background-size: 1920px auto; 
            background-position: top left;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.6); 
            background-blend-mode: darken;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* --- 2. CONTENEDOR Y TABLA --- */
        #fids-container {
            margin-top: 188px; 
            padding: 0 370px;
            width: 100%;
        }

        /* EFECTO DESVANECEDOR (FADE) */
        #tabla-datos {
            transition: opacity 0.5s ease-in-out;
            opacity: 1;
        }

        .fade-out {
            opacity: 0 !important;
        }

        table {
            border-collapse: collapse;
            table-layout: fixed; 
            width: 1550px; 
        }

        td {
            padding: 8px 10px;
            font-size: 19px;
            font-weight: 500;
            color: #ffffff;
            border-bottom: 1px solid transparent;
            vertical-align: middle; 
            height: 44px; 
            line-height: 1;
        }

        /* --- 3. CONFIGURACIÓN REORDENADA DE COLUMNAS --- */
        /* Col 1: Hora Inicio */ td:nth-child(1) { width: 160px; color: #ffffff; font-weight: bold; font-size: 33px; }
        /* Col 2: Hora Fin */    td:nth-child(2) { width: 130px; color: #B3E5FC; font-size: 30px; }
        /* Col 3: Nivel */ td:nth-child(3) { width: 210px; text-align: center; } 
        /* Col 4: Materia */     td:nth-child(4) { width: 380px; color: #ffffff; font-size: 22px; }
        /* Col 5: Profesor */    td:nth-child(5) { width: 340px; color: #B3E5FC; font-weight: bold; font-size: 22px; }
        /* Col 6: EDIFICIO (NUEVA) */ td:nth-child(6) { width: 120px; text-align: left; color: #ffffff; font-size: 28px; font-weight: bold; }
        /* Col 7: Estado */      td:nth-child(7) { width: 200px; text-align: left; }

        /* --- ESTILOS DE IMÁGENES --- */
        .img-estado { height: 44px; width: auto; vertical-align: middle; }
        .img-nivel { height: 30px; width: auto; vertical-align: middle; }
        .img-edificio { height: 44px; width: auto; vertical-align: middle; margin-right: 8px; }

        .reloj {
            position: absolute;
            top: 35px;
            right: 60px;
            font-size: 34px;
            font-weight: bold;
            color: #ffd700;
            text-align: right;
        }

        .paginador {
            font-size: 18px;
            color: #ffffff;
            font-weight: normal;
            margin-top: 5px;
        }
        
        @keyframes parpadeo {
          0% { opacity: 1; }
          50% { opacity: 0.3; }
          100% { opacity: 1; }
        }

        .efecto-parpadeo {
          animation: parpadeo 2.5s infinite ease-in-out;
        }

        .recortar-texto {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="reloj">
        <div id="reloj">00:00:00</div>
        <div id="paginador" class="paginador">PÁGINA 1 de 1</div>
    </div>

    <div id="fids-container">
        <div id="tabla-datos">Cargando programación...</div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtJ6ZlMM6skUMzxHY2LYmtU3WBojxBxxP1k7_exlFwS4THkhsC9OAt6Iq4NjxoXDvnugZwRzTjA9ZI/pub?gid=52319349&single=true&output=csv';
        
        const filasPorPagina = 15;
        let todasLasFilas = [];
        let indicePagina = 0;

        const diccionarioEstados = { "EN CURSO": "BotonEncurso.png", "INICIANDO": "BotonIniciando.png", "FINALIZANDO": "BotonFinalizando.png", "PROGRAMADA": "BotonProgramada.png" };
        const diccionarioNiveles = { "T.S.U.": "botonTSU.png", "LICENCIATURA": "botonLicenciatura.png", "MAESTRIA": "botonMaestria.png", "DOCTORADO": "botonDoctorado.png" };
        const diccionarioEdificios = { "I": "EdificioI.png", "N": "EdificioN.png", "K": "EdificioK.png", "L": "EdificioL.png", "P": "EdificioP.png", "Q": "EdificioQ.png" };

        async function cargarDatos() {
            try {
                const respuesta = await fetch(csvUrl + '&t=' + Date.now());
                const texto = await respuesta.text();
                const filasBrutas = texto.split('\n').filter(f => f.trim() !== '');
                todasLasFilas = filasBrutas.slice(1); 
                if(indicePagina === 0) mostrarPagina();
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function mostrarPagina() {
            if (todasLasFilas.length === 0) return;

            const contenedor = document.getElementById('tabla-datos');
            
            // 1. Iniciar desvanecimiento
            contenedor.classList.add('fade-out');

            setTimeout(() => {
                const totalPaginas = Math.ceil(todasLasFilas.length / filasPorPagina);
                const inicio = indicePagina * filasPorPagina;
                const fin = inicio + filasPorPagina;
                const filasActuales = todasLasFilas.slice(inicio, fin);

                document.getElementById('paginador').innerText = `PÁGINA ${indicePagina + 1} de ${totalPaginas}`;

                let tablaHTML = '<table><tbody>';

                for (let i = 0; i < filasPorPagina; i++) {
                    if (filasActuales[i]) {
                        const columnas = filasActuales[i].split(',');
                        
                        // Mapeo manual para mover la columna 6 (índice 5) a la posición 3
                        // El nuevo orden de índices será: 0, 1, 5, 2, 3, 4, 6
                        const ordenColumnas = [0, 1, 4, 2, 3, 5, 6];
                        
                        tablaHTML += '<tr>';
                        ordenColumnas.forEach((indiceOriginal, posicionVisual) => {
                            let dato = columnas[indiceOriginal] ? columnas[indiceOriginal].trim() : '';
                            
                            // Lógica por POSICIÓN VISUAL
                            if (posicionVisual === 3 || posicionVisual === 4) { // Materia y Profesor
                                tablaHTML += `<td><div class="recortar-texto">${dato}</div></td>`;
                            } 
                            else if (posicionVisual === 5) { // NUEVA POSICIÓN: Edificios
                                let primeraLetra = dato.charAt(0).toUpperCase();
                                if (diccionarioEdificios[primeraLetra]) {
                                    tablaHTML += `<td><img src="${diccionarioEdificios[primeraLetra]}" class="img-edificio">${dato.slice(1)}</td>`;
                                } else {
                                    tablaHTML += `<td>${dato}</td>`;
                                }
                            }
                            else if (posicionVisual === 2) { // Nivel Académico
                                let nivelUpper = dato.toUpperCase();
                                tablaHTML += `<td>${diccionarioNiveles[nivelUpper] ? `<img src="${diccionarioNiveles[nivelUpper]}" class="img-nivel">` : dato}</td>`;
                            }
                            else if (posicionVisual === 6) { // Estados
                                let estadoUpper = dato.toUpperCase();
                                let claseExtra = (estadoUpper === "FINALIZANDO" || estadoUpper === "INICIANDO") ? "efecto-parpadeo" : "";
                                tablaHTML += `<td>${diccionarioEstados[estadoUpper] ? `<img src="${diccionarioEstados[estadoUpper]}" class="img-estado ${claseExtra}">` : dato}</td>`;
                            }
                            else {
                                tablaHTML += `<td>${dato}</td>`;
                            }
                        });
                        tablaHTML += '</tr>';
                    } else {
                        tablaHTML += '<tr style="height:60px"><td colspan="7"></td></tr>';
                    }
                }

                tablaHTML += '</tbody></table>';
                contenedor.innerHTML = tablaHTML;

                // 2. Quitar desvanecimiento
                contenedor.classList.remove('fade-out');

                indicePagina = (indicePagina + 1) % totalPaginas;
            }, 500); // El tiempo del timeout debe coincidir con el transition del CSS
        }

        function actualizarReloj() {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
        }

        actualizarReloj();
        setInterval(actualizarReloj, 1000);
        cargarDatos();
        setInterval(cargarDatos, 30000); 
        setInterval(mostrarPagina, 10000); 
    </script>
</body>
</html>
