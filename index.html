<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS CUCEA - Programación en Vivo</title>
    <style>
        /* --- 1. CONFIGURACIÓN DEL FONDO --- */
        body {
            background-image: url('https://lh3.googleusercontent.com/d/15PfdBzPzKhcW8CUeBwGF7YVaJC8Knh6S');
            background-size: 1920px auto; 
            background-position: top left;
            background-repeat: no-repeat;
            background-color: #030a1a; 
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* --- 2. CONTENEDOR DE LA TABLA --- */
        #fids-container {
            margin-top: 188px; 
            padding: 0 50px; /* Ajustado para dar más espacio lateral */
            width: 100%;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* OBLIGATORIO para que los anchos en px funcionen */
        }

        th { display: none; }

        /* --- 3. ESTILO DE LAS FILAS (DOBLE LÍNEA PERMITIDA) --- */
        td {
            padding: 5px 10px;
            font-size: 20px; /* Bajamos un poco el tamaño para que quepan 2 líneas bien */
            font-weight: 500;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            
            /* --- AJUSTES PARA DOBLE LÍNEA --- */
            white-space: normal;      /* Permite saltos de línea */
            word-wrap: break-word;    /* Rompe palabras largas si es necesario */
            vertical-align: top;      /* Alinea el texto arriba para que no flote en medio */
            height: 55px;             /* Aumentamos un poco la altura fija para la doble línea */
            line-height: 1.1;         /* Espacio entre renglones de la misma celda */
        }

        /* --- 4. ANCHOS DE COLUMNA FIJOS EN PÍXELES --- */
        /* Ajusta estos números según tu imagen de fondo */
        td:nth-child(1) { width: 10px; color: #ffd700; font-weight: bold; } /* Hora */
        td:nth-child(2) { width: 10px; } /* Materia (la más ancha) */
        td:nth-child(3) { width: 30px; } /* NRC o ID */
        td:nth-child(4) { width: 30px; } /* Profesor */
        td:nth-child(5) { width: 15px; } /* Aula/Edificio */

        .reloj {
            position: absolute;
            top: 35px;
            right: 50px;
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

    <div id="reloj" class="reloj">00:00:00</div>

    <div id="fids-container">
        <div id="tabla-datos">Cargando programación...</div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtJ6ZlMM6skUMzxHY2LYmtU3WBojxBxxP1k7_exlFwS4THkhsC9OAt6Iq4NjxoXDvnugZwRzTjA9ZI/pub?gid=1178925333&single=true&output=csv';
        const maxFilas = 16; 

        async function cargarDatos() {
            try {
                const respuesta = await fetch(csvUrl + '&t=' + Date.now());
                const texto = await respuesta.text();
                const filas = texto.split('\n');
                
                let tablaHTML = '<table><tbody>';

                for (let i = 1; i <= maxFilas; i++) {
                    if (filas[i]) {
                        const columnas = filas[i].split(',');
                        tablaHTML += '<tr>';
                        // Solo tomamos las primeras 5 columnas para asegurar que el ancho no se rompa
                        for(let j=0; j<5; j++) {
                            tablaHTML += `<td>${columnas[j] ? columnas[j].trim() : ''}</td>`;
                        }
                        tablaHTML += '</tr>';
                    } else {
                        tablaHTML += '<tr style="height:55px"><td></td><td></td><td></td><td></td><td></td></tr>';
                    }
                }

                tablaHTML += '</tbody></table>';
                document.getElementById('tabla-datos').innerHTML = tablaHTML;

            } catch (error) {
                console.error("Error al obtener CSV:", error);
            }
        }

        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString();
        }

        actualizarReloj();
        setInterval(actualizarReloj, 1000);
        cargarDatos();
        setInterval(cargarDatos, 30000); // Actualiza cada 30 segundos para mayor frescura

    </script>
</body>
</html>
