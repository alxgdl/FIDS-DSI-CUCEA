<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS CUCEA - Motor de Tiempo JS</title>
    <style>
    /* --- 1. CONFIGURACIÓN DEL FONDO --- */
            body {
                /* Aquí está la magia: Una capa negra al 60% de opacidad sobre la imagen */
                background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url('FIDSFondo4.png');
                background-size: 1920px auto; 
                background-position: top left;
                background-repeat: no-repeat;
                background-attachment: fixed;
                background-color: #000; /* Se queda como respaldo */
                color: white;
                font-family: 'Segoe UI', Arial, sans-serif;
                margin: 0;
                padding: 0;
                overflow: hidden;
            }

        /* --- 2. CONTENEDORES --- */
        #fids-header-container {
            padding: 0 120px; 
            margin-top: 78px;
        }

        #fids-container {
            margin-top: 45px; 
            padding: 0 120px;
            width: 120%;
        }

        /* EFECTO DESVANECEDOR (FADE) */
        #tabla-datos {
            transition: opacity 0.5s ease-in-out;
            opacity: 1;
        }

        .fade-out {
            opacity: 0 !important;
        }

        /* --- 3. ESTRUCTURA BASE DE TABLAS --- */
        table {
            border-collapse: collapse;
            table-layout: fixed; 
            width: 1500px;
        }

        td, th {
            padding: 8px 10px;
            vertical-align: middle; 
            height: 45px; 
            line-height: 1;
        }

        .tabla-encabezado {
            background-color: transparent;
        }
        
        .tabla-encabezado th {
            color: #ffd700; /* Dorado */
            font-size: 30px; 
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 3px solid #ffd700;
            text-align: left;
        }

        .tabla-encabezado th:nth-child(1),
        .tabla-encabezado th:nth-child(2),
        .tabla-encabezado th:nth-child(3),
        .tabla-encabezado th:nth-child(6), 
        .tabla-encabezado th:nth-child(7) {
            text-align: center;
        }

        /* --- 5. ESTILOS DE DATOS --- */
        #tabla-datos td {
            font-size: 19px;
            font-weight: 500;
            color: #ffffff;
        }

        #tabla-datos td:nth-child(1) { text-align: center; font-size: 33px; font-weight: bold; } 
        #tabla-datos td:nth-child(2) { text-align: center; color: #B3E5FC; font-size: 26px; }   
        #tabla-datos td:nth-child(3) { text-align: center; }                                   
        #tabla-datos td:nth-child(4) { text-align: left; color: #B3E5FC; font-weight: bold; font-size: 22px; } 
        #tabla-datos td:nth-child(5) { text-align: left; font-size: 22px; }                    
        #tabla-datos td:nth-child(6) { text-align: center; font-size: 28px; font-weight: bold; } 
        #tabla-datos td:nth-child(7) { text-align: center; }                                     

        .col-1 { width: 150px; }
        .col-2 { width: 120px; }
        .col-3 { width: 220px; }
        .col-4 { width: 380px; }
        .col-5 { width: 330px; }
        .col-6 { width: 150px; }
        .col-7 { width: 180px; }

        .img-estado { height: 44px; width: auto; vertical-align: middle; }
        .img-nivel { height: 30px; width: auto; vertical-align: middle; }
        .img-edificio { height: 44px; width: auto; vertical-align: middle; margin-right: 8px; }

        @keyframes parpadeo {
          0% { opacity: 1; }
          50% { opacity: 0.3; }
          100% { opacity: 1; }
        }
        .efecto-parpadeo { animation: parpadeo 2.5s infinite ease-in-out; }

        .recortar-texto {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- 8. FOOTER FIJO --- */
        .reloj-fijo { position: fixed; top: 1150px; left: 1265px; text-align: center; z-index: 100; }
        #reloj { font-size: 35px; font-weight: bold; color: #ffffff; line-height: 1; }
        
        .paginador-fijo { position: fixed; top: 1150px; left: 1565px; text-align: center; z-index: 100; }                
        #paginador { font-size: 33px; color: #ffffff; font-weight: bold; } 

        .totalmaterias-fijo { position: fixed; top: 1150px; left: 145px; text-align: center; z-index: 100; }                
        #totalmaterias { font-size: 33px; color: #ffffff; font-weight: bold; } 

        .actualizacion-fijo { position: fixed; top: 1150px; left: 740px; text-align: center; z-index: 100; }                
        #actualizacion { font-size: 33px; color: #ffffff; font-weight: bold; }
        
    </style>
</head>
<body>

    <div id="fids-header-container">
        <table class="tabla-encabezado">
            <thead>
                <tr>
                    <th class="col-1">HORA</th>
                    <th class="col-2">FIN</th>
                    <th class="col-3">NIVEL</th>
                    <th class="col-4">ASIGNATURA</th>
                    <th class="col-5">DOCENTE</th>
                    <th class="col-6">LUGAR</th>
                    <th class="col-7">ESTADO</th>
                </tr>
            </thead>
        </table>
    </div>

    <div id="fids-container">
        <div id="tabla-datos">Iniciando sistema FIDS...</div>
    </div>

    <div class="footer-info">
        <div class="totalmaterias-fijo"><div id="totalmaterias">MATERIAS EN PANTALLA: --</div></div>
        <div class="actualizacion-fijo"><div id="actualizacion">SINCRONIZANDO...</div></div>
        <div class="reloj-fijo"><div id="reloj">00:00:00</div></div>
        <div class="paginador-fijo"><div id="paginador">PÁGINA --</div></div>
    </div>

    <script>
        // Enlace público CSV (Ya no importa el caché severo, porque evaluamos la hora localmente)
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtJ6ZlMM6skUMzxHY2LYmtU3WBojxBxxP1k7_exlFwS4THkhsC9OAt6Iq4NjxoXDvnugZwRzTjA9ZI/pub?gid=1744844510&single=true&output=csv';
        
        const filasPorPagina = 15;
        let todasLasMateriasDelDia = []; // Almacenará la matriz maestra del día
        let materiasFiltradas = [];      // Almacenará solo las que se deben mostrar
        let indicePagina = 0;

        const diccionarioEstados = { "EN CURSO": "BotonEncurso.png", "INICIANDO": "BotonIniciando.png", "FINALIZANDO": "BotonFinalizando.png", "PROGRAMADA": "BotonProgramada.png" };
        const diccionarioNiveles = { "T.S.U.": "botonTSU.png", "LICENCIATURA": "botonLicenciatura.png", "MAESTRIA": "botonMaestria.png", "DOCTORADO": "botonDoctorado.png" };
        const diccionarioEdificios = { "I": "EdificioI.png", "N": "EdificioN.png", "K": "EdificioK.png", "L": "EdificioL.png", "P": "EdificioP.png", "Q": "EdificioQ.png" };

        // 1. FUNCIÓN MATEMÁTICA PARA HORAS: Convierte "9:00 AM" a minutos (ej. 540)
        function convertirAMinutos(horaString) {
            if (!horaString) return -1;
            const partes = horaString.trim().split(/\s+/);
            if (partes.length < 2) return -1;
            
            const [horaMin, ampm] = partes;
            const partesTiempo = horaMin.split(':');
            let h = parseInt(partesTiempo[0], 10);
            let m = parseInt(partesTiempo[1], 10);

            if (ampm.toUpperCase() === 'PM' && h !== 12) h += 12;
            if (ampm.toUpperCase() === 'AM' && h === 12) h = 0;

            return (h * 60) + m;
        }

        // 2. FUNCIÓN DE DESCARGA: Se ejecuta 1 vez por hora
        async function cargarDatos() {
            try {
                const respuesta = await fetch(`${csvUrl}&t=${Date.now()}`);
                const texto = await respuesta.text();
                const textoLimpio = texto.replace(/^\uFEFF/, "").trim();
                
                const filasBrutas = textoLimpio.split('\n').filter(f => f.trim() !== '');



                // Procesamos encabezados para rescatar datos de las celdas H1, H2 y H3
                if (filasBrutas.length >= 3) {
                    
                    // 1. Rescatar celda H1 (Fila 1, índice 0)
                    const colH1 = filasBrutas[0].split(',');
                    const valorH1 = (colH1[7] || "").replace(/"/g, "").trim();
                    
                    // 2. Rescatar celda H2 (Fila 2, índice 1)
                    const colH2 = filasBrutas[1].split(',');
                    const valorH2 = (colH2[7] || "").replace(/"/g, "").trim();
                
                    // 3. Rescatar celda H3 (Fila 3, índice 2) - La que ya tenías
                    const colH3 = filasBrutas[2].split(',');
                    const valorH3 = (colH3[7] || "").replace(/"/g, "").trim();
                
                    // 4. Mandar los datos al HTML
                    // Asegúrate de crear elementos con id="dato-h1" y id="dato-h2" en tu HTML
                    
                    const elementoH1 = document.getElementById('dato-h1');
                    if (elementoH1) elementoH1.innerText = valorH1; // O puedes ponerle texto antes como `Dato 1: ${valorH1}`
                
                    const elementoH2 = document.getElementById('dato-h2');
                    if (elementoH2) elementoH2.innerText = valorH2;
                
                    const elementoH3 = document.getElementById('actualizacion');
                    if (elementoH3) elementoH3.innerText = `ACT: ${valorH3}`;
                }
/*       
                // Procesamos encabezados para la fecha de actualización
                if (filasBrutas.length >= 3) {
                    const colH3 = filasBrutas[2].split(',');
                    document.getElementById('actualizacion').innerText = `ACT: ${(colH3[7] || "").replace(/"/g, "").trim()}`;
                }
*/
                // Guardamos TODAS las materias del día como una matriz
                todasLasMateriasDelDia = filasBrutas.slice(1).map(fila => {
                    return fila.split(',').map(celda => celda.replace(/"/g, "").trim());
                });

                // Disparamos el motor de tiempo inmediatamente
                procesarMotorDeTiempo();

            } catch (error) {
                console.error("Error al descargar itinerario del día:", error);
            }
        }

        // 3. MOTOR DE TIEMPO: Se ejecuta cada minuto y aplica tu lógica
        function procesarMotorDeTiempo() {
            if (todasLasMateriasDelDia.length === 0) return;

            const ahora = new Date();
            const minActuales = (ahora.getHours() * 60) + ahora.getMinutes();
            
            let materiasTemporales = [];
            let proximaHoraInicio = 9999; // Buscaremos el bloque más cercano en el futuro

            // PASO A: Encontrar cuál es el siguiente "Bloque Programado"
            todasLasMateriasDelDia.forEach(columnas => {
                const tInicio = convertirAMinutos(columnas[0]); // Columna 1
                if (tInicio > minActuales && tInicio < proximaHoraInicio) {
                    proximaHoraInicio = tInicio;
                }
            });

            // PASO B: Evaluar estado materia por materia
            todasLasMateriasDelDia.forEach(columnas => {
                // Hacemos una copia para no alterar la matriz maestra
                let filaEvaluada = [...columnas]; 
                
                const tInicio = convertirAMinutos(filaEvaluada[0]);
                const tFin = convertirAMinutos(filaEvaluada[1]);

                if (tInicio === -1 || tFin === -1) return;

                // Si ya se acabó la clase, la ignoramos (ni entra a la lista)
                if (minActuales >= tFin) return;

                let estadoFinal = "";

                // LÓGICA DE TIEMPOS
                if (minActuales >= tInicio && minActuales < tFin) {
                    // La clase está sucediendo en este momento
                    if (minActuales < tInicio + 20) {
                        estadoFinal = "INICIANDO";
                    } else if (minActuales >= tFin - 20) {
                        estadoFinal = "FINALIZANDO";
                    } else {
                        estadoFinal = "EN CURSO";
                    }
                } else if (tInicio === proximaHoraInicio) {
                    // Es la hora más próxima donde empiezan clases
                    estadoFinal = "PROGRAMADA";
                }

                // Si se le asignó un estado, la agregamos a la pantalla y reescribimos la columna 6
                if (estadoFinal !== "") {
                    filaEvaluada[6] = estadoFinal; 
                    materiasTemporales.push(filaEvaluada);
                }
            });

            // Actualizamos la lista oficial a renderizar
            if (materiasFiltradas.length !== materiasTemporales.length) {
                indicePagina = 0; // Reiniciar paginador si cambió la cantidad de materias mostradas
            }
            
            materiasFiltradas = materiasTemporales;
            document.getElementById('totalmaterias').innerText = `MATERIAS EN PANTALLA: ${materiasFiltradas.length}`; 

            // Si es la primera vez que inicia, forzamos mostrar
            if (document.getElementById('tabla-datos').innerText.includes("Iniciando")) {
                mostrarPagina();
            }
        }

        // 4. RENDERIZADO VISUAL
        function mostrarPagina() {
            if (materiasFiltradas.length === 0) {
                document.getElementById('tabla-datos').innerHTML = "<div style='text-align:center; padding: 50px; font-size: 30px;'>No hay materias activas en este momento.</div>";
                return;
            }

            const contenedor = document.getElementById('tabla-datos');
            contenedor.classList.add('fade-out');

            setTimeout(() => {
                const totalPaginas = Math.ceil(materiasFiltradas.length / filasPorPagina);
                const inicio = indicePagina * filasPorPagina;
                const fin = inicio + filasPorPagina;
                const filasActuales = materiasFiltradas.slice(inicio, fin);

                document.getElementById('paginador').innerText = `PÁGINA ${indicePagina + 1} de ${totalPaginas}`;

                let tablaHTML = '<table><tbody>';

                for (let i = 0; i < filasPorPagina; i++) {
                    if (filasActuales[i]) {
                        const columnas = filasActuales[i];
                        const ordenColumnas = [0, 1, 4, 2, 3, 5, 6];
                        
                        tablaHTML += '<tr>';
                        ordenColumnas.forEach((indiceOriginal, posicionVisual) => {
                            let dato = columnas[indiceOriginal] || '';
                            let claseAncho = `col-${posicionVisual + 1}`;

                            if (posicionVisual === 3 || posicionVisual === 4) { 
                                tablaHTML += `<td class="${claseAncho}"><div class="recortar-texto">${dato}</div></td>`;
                            } 
                            else if (posicionVisual === 5) { 
                                let letra = dato.charAt(0).toUpperCase();
                                tablaHTML += `<td class="${claseAncho}">${diccionarioEdificios[letra] ? `<img src="${diccionarioEdificios[letra]}" class="img-edificio">${dato.slice(1)}` : dato}</td>`;
                            }
                            else if (posicionVisual === 2) { 
                                let nivelUpper = dato.toUpperCase();
                                tablaHTML += `<td class="${claseAncho}">${diccionarioNiveles[nivelUpper] ? `<img src="${diccionarioNiveles[nivelUpper]}" class="img-nivel">` : dato}</td>`;
                            }
                            else if (posicionVisual === 6) { 
                                let estUpper = dato.toUpperCase();
                                let parpadea = (estUpper === "FINALIZANDO" || estUpper === "INICIANDO") ? "efecto-parpadeo" : "";
                                tablaHTML += `<td class="${claseAncho}">${diccionarioEstados[estUpper] ? `<img src="${diccionarioEstados[estUpper]}" class="img-estado ${parpadea}">` : dato}</td>`;
                            }
                            else {
                                tablaHTML += `<td class="${claseAncho}">${dato}</td>`;
                            }
                        });
                        tablaHTML += '</tr>';
                    } else {
                        tablaHTML += '<tr style="height:60px"><td colspan="7"></td></tr>';
                    }
                }

                tablaHTML += '</tbody></table>';
                contenedor.innerHTML = tablaHTML;
                contenedor.classList.remove('fade-out');

                indicePagina = (indicePagina + 1) % totalPaginas;
            }, 500);
        }

        function actualizarReloj() {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString('es-MX', { hour12: true });
        }

        // INICIALIZADORES GENERALES
        actualizarReloj();
        setInterval(actualizarReloj, 1000); // Reloj del Footer
        
        cargarDatos(); 
        setInterval(cargarDatos, 3600000); // Se trae la lista maestra 1 VEZ POR HORA
        setInterval(procesarMotorDeTiempo, 60000); // Recalcula los estados CADA MINUTO
        setInterval(mostrarPagina, 10000); // Da la vuelta a la página CADA 10 SEGUNDOS
        
    </script>
</body>
</html>
